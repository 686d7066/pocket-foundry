name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build
        run: npm run build

  release:
    name: Create Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get Version
        shell: bash
        id: get-version
        run: echo "version=$(node ./.github/workflows/get-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Package Module
        shell: bash
        run: |
          cd dist/pocket-foundry
          zip -r ../../module.zip module.json scripts/ styles/ templates/ systems/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: "v${{ steps.get-version.outputs.version }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./dist/pocket-foundry/module.json,./module.zip"
          tag: ${{ steps.get-version.outputs.version }}
          commit: ${{ github.sha }}
